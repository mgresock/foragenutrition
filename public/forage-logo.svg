<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#34C759"/>

  <!-- Left leaf — sweeps from stem base up and left -->
  <path
    d="M256 416 C256 416 112 336 112 208 C112 136 160 96 256 144"
    stroke="white"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Right leaf — shorter, sweeps up-right -->
  <path
    d="M256 320 C256 320 352 264 352 176 C352 128 320 104 256 144"
    stroke="white"
    stroke-width="22"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-opacity="0.85"
  />

  <!-- Stem -->
  <path
    d="M256 144 L256 416"
    stroke="white"
    stroke-width="28"
    stroke-linecap="round"
  />

  <!-- Root dot -->
  <circle cx="256" cy="416" r="22" fill="white"/>
</svg>
